# Local / staging stack. On Render: use managed Redis + MongoDB Atlas; separate web + worker services.
services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file:
      - .env
    depends_on:
      - redis
      - mongo

  worker:
    build: .
    command: celery -A config.celery worker -l info --concurrency=2
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file:
      - .env
    depends_on:
      - redis
      - mongo

  beat:
    build: .
    command: celery -A config.celery beat -l info
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      mongo_data:/data/db

volumes:
  mongo_data:
